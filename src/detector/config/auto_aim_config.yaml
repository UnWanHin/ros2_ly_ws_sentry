# ==========================================================
# ROS 2 全域參數檔 (Wildcard Version)
# 核心魔法：使用 /** 讓所有節點都能讀取同一份參數
# ==========================================================
/**:
  ros__parameters:
    # ----------------------------------------------------
    # 1. Detector 專用配置 (保留斜線格式以相容舊代碼)
    # ----------------------------------------------------
    # 相机参数
    "camera_param.camera_sn": "KE0200060396"
    "camera_param/camera_sn": "KE0200060396"
    "camera_param.ExposureTime": 5000.0
    "camera_param/ExposureTime": 5000.0
    "camera_param.Gain": 16.0
    "camera_param/Gain": 16.0
    "camera_param.RedBalanceRatio": 1.2266
    "camera_param/RedBalanceRatio": 1.2266
    "camera_param.GreenBalanceRatio": 1.0
    "camera_param/GreenBalanceRatio": 1.0
    "camera_param.BlueBalanceRatio": 1.3711
    "camera_param/BlueBalanceRatio": 1.3711
    # WhiteBalance: 4000


    # detector模块调试配置
    # ----------------------------------------------------
    # 模式速查（只做注释说明，不代表当前值已切换）
    # 比赛模式（上车）:
    #   detector_config/use_video=false
    #   detector_config/use_ros_bag=false
    #   io_config/use_virtual_device=false
    #   detector_config/debug_mode=false
    #   detector_config/show=false
    #   detector_config/draw=false 或 true(视性能预算)
    #
    # 调试模式（离车/联调）:
    #   detector_config/use_video=true（离线回放）
    #   或 detector_config/use_video=false（真机相机联调）
    #   io_config/use_virtual_device=true（无下位机时）
    #   detector_config/debug_mode=true（需要详细日志时）
    #   detector_config/show=true（需要RQT看图时）
    # ----------------------------------------------------
    # 路徑使用相對路徑 (請在 workspace 根目錄執行)
    "detector_config.classifier_path": "src/detector/Extras/classifier.xml"
    "detector_config/classifier_path": "src/detector/Extras/classifier.xml"
    "detector_config.detector_path": "src/detector/Extras/armor_detector_model.xml"
    "detector_config/detector_path": "src/detector/Extras/armor_detector_model.xml"
    "detector_config.car_model_path": "src/detector/Extras/car_detector_model.xml"
    "detector_config/car_model_path": "src/detector/Extras/car_detector_model.xml"
    "detector_config.video_path": "src/record/record.mkv"
    "detector_config/video_path": "src/record/record.mkv" # 视频路径

    # 是否开启调试模式
    # 比赛建议: false
    # 调试建议: true（仅在需要详细日志时开启）
    "detector_config.debug_mode": true
    "detector_config/debug_mode": true
    # 颜色调试开关
    # 比赛建议: 按真实敌我颜色设置（通常 false）
    # 调试建议: 误识别时临时切换排查
    "detector_config.debug_team_blue": true
    "detector_config/debug_team_blue": true 
    
    # 图像显示相关
    # 比赛建议: web_show=false, show=false, draw=false/true(看算力)
    # 调试建议: web_show=true, show=true, draw=true
    "detector_config.web_show": true
    "detector_config/web_show": true
    "detector_config.show": true
    "detector_config/show": true       # 是否发布相机话题 pub_image（RQT看图需要开）
    "detector_config.draw": true
    "detector_config/draw": true        # 是否开启绘制 (畫框框)
    "detector_config.use_ros_bag": false
    "detector_config/use_ros_bag": false
    "detector_config.save_video": false
    "detector_config/save_video": false # 比赛建议 false；调试可开（当前功能受环境影响）
    "detector_config.use_video": true
    "detector_config/use_video": true   # 比赛建议 false；离车调试建议 true

    # ----------------------------------------------------
    # 2. Solver 配置 (雙重相容區)
    # Predictor 需要點 (.)，Detector 需要斜線 (/)
    # ----------------------------------------------------
    #  相机坐标系：       装甲板坐标系：     世界坐标系:
    #         z   x           y             和相机坐标系一致
    #         |  /\           ^
    #         ^  /            |
    #         | /             |
    #  y <----o/              o----> x
    
    # 這裡使用 "縮排結構"，ROS 2 會自動解析為點 (.)
    # 給 Predictor 用： solver_config.camera_intrinsic_matrix
    solver_config:
      camera_offset: [0.0, 0.0, 52.6] # 相机到枪口的偏移(单位: mm)
      # camera_rotation: [0.0, 3.5, -0.5]  # 相机旋转角度(单位: °)-> roll pitch yaw  高打低情况下
      camera_rotation: [0.0, 3.3, 0.0]     # 相机旋转角度(单位: °)-> roll pitch yaw  水平情况下如此
      camera_intrinsic_matrix: [
        1331.1, 0.0, 624.5817,
        0.0, 1330.1, 526.3662,
        0.0, 0.0, 1.0
      ]
      camera_distortion_coefficients: [
        -0.1059, -0.3427, 0.0072, 0.0, 1.4125
      ]

    # 為了相容 Detector (如果它硬要找斜線)，我們必須"重複"宣告一次帶斜線的 key
    # 給 Detector 用： solver_config/camera_intrinsic_matrix
    "solver_config/camera_offset": [0.0, 0.0, 52.6]
    "solver_config/camera_rotation": [0.0, 3.3, 0.0]
    "solver_config/camera_intrinsic_matrix": [1331.1, 0.0, 624.5817, 0.0, 1330.1, 526.3662, 0.0, 0.0, 1.0]
    "solver_config/camera_distortion_coefficients": [-0.1059, -0.3427, 0.0072, 0.0, 1.4125]

    # ----------------------------------------------------
    # 3. Controller 配置
    # ----------------------------------------------------
    # 自動解析為 controller_config.bullet_speed
    controller_config:
      bullet_speed: 23.0  # 子弹速度(单位: m/s)
      shoot_delay: 0.02   # 预测延迟
      
      # 射擊補償表
      shoot_table_adjust:
        enable: true
        pitch:
          intercept: 0.5  # 偏移量(单位: °)
          coef_z: 0.0     # z轴系数
          coef_d: 0.0     # 距离系数
          coef_z2: 0.0
          coef_zd: 0.0
          coef_d2: 0.3
        yaw:
          intercept: 0.0  # 偏移量(单位: °)
          coef_z: 0.0     # z轴系数
          coef_d: 0.0     # 距离系数
          coef_z2: 0.0
          coef_zd: 0.0
          coef_d2: 0.5

    # ----------------------------------------------------
    # 4. IO 配置
    # ----------------------------------------------------
    io_config:
      use_virtual_device: false        # 比赛建议 false；离车调试建议 true
      device_name: "/dev/ttyACM0"     # 预留字段：当前 gimbal_driver 主程序未读取
      baud_rate: 115200               # 预留字段：当前 gimbal_driver 主程序未读取
    "io_config/use_virtual_device": false # 比赛建议 false；离车调试建议 true
    "io_config/device_name": "/dev/ttyACM0"
    "io_config/baud_rate": 115200
