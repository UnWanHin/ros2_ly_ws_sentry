schema: ly_decision_viz_config_v1
updated: "2026-04-27"

window:
  width: 1500
  height: 900
  min_width: 960
  min_height: 620
  panel_width: 390
  timeline_height: 92
  fps: 60
  start_paused: false
  playback_speed: 1.0
  show_point_labels: false

paths:
  default_map: tools/maps/basemaps/buff_map_field.png
  sample_trace: sample/sample_trace.jsonl

web_stream:
  enabled: true
  host: 0.0.0.0
  port: 9000
  fps: 12.0
  jpeg_quality: 80

match_control:
  enabled: true
  mode: rmuc_super_confrontation_regional
  duration_sec: 420
  rewind_step_sec: 10
  forward_step_sec: 10
  control_file: /tmp/decision_viz_match_control.jsonl

field_cm:
  width: 2800
  height: 1500
  frame: left_bottom_origin_cm

timeline:
  path_history_limit: 500
  jump_step: 25

scripted_path:
  enabled: true
  side: auto            # auto/red/blue
  speed_cmps: 140       # cm/s
  loop: true
  show_labels: false
  show_future: false
  label: Patrol
  line_width: 3
  marker_radius: 8
  color: "#f5c542"
  # priority: points_cm > goal_ids
  points_cm: []
  goal_ids: [0, 6, 10, 14, 17, 10, 6]

resources:
  ammo_max: 50

layers:
  terrain: true
  structures: true
  grid: true
  all_goals: true
  current_goal: true
  goal_path: true
  scripted_path: true
  units: true
  unit_health_bars: true
  recent_changes: true

colors:
  bg: "#101216"
  panel: "#1b2026"
  panel2: "#252b33"
  text: "#edf2f7"
  muted: "#a8b0ba"
  line: "#3a424d"
  accent: "#f5c542"
  friend: "#4cc38a"
  enemy: "#e85d5d"
  neutral: "#4fb3d9"
  red: "#e85d5d"
  blue: "#5d8ee8"
  black: "#000000"
  white: "#ffffff"

terrain:
  enabled: true
  source: visual_estimate_from_buff_map_field
  note: Approximate 2D elevation overlay. Confirm with official CAD/rules before using for path-cost decisions.
  show_labels: false
  levels:
    high:
      label: high
      color: "#f5c542"
      alpha: 42
      outline: "#f5c542"
      outline_alpha: 135
    ramp:
      label: ramp
      color: "#4fb3d9"
      alpha: 34
      outline: "#4fb3d9"
      outline_alpha: 120
  zones:
    - {name: RedLeftHighLand, level: high, rect: [300, 1235, 230, 180]}
    - {name: BlueLeftHighLand, level: high, rect: [2270, 85, 230, 180]}
    - {name: RedBuffPlatform, level: high, rect: [825, 1295, 210, 155]}
    - {name: BlueBuffPlatform, level: high, rect: [1765, 50, 210, 155]}
    - {name: RedCastleRamp, level: ramp, rect: [610, 700, 285, 310]}
    - {name: BlueCastleRamp, level: ramp, rect: [1905, 485, 285, 310]}
    - {name: CenterPlatform, level: high, rect: [1180, 620, 450, 260]}

structures:
  enabled: true
  source: rules_v1.4.1_plus_map_visual_alignment
  note: >
    Key structures are annotated for offline decision review. Geometry is approximate to map artwork and should be
    refined with official CAD alignment if used for precise navigation constraints.
  show_labels: true
  styles:
    wall:
      fill: "#7b8794"
      alpha: 34
      outline: "#a7b2be"
      outline_alpha: 128
    energy_mechanism:
      fill: "#f59e0b"
      alpha: 52
      outline: "#facc15"
      outline_alpha: 150
    outpost:
      fill: "#ec4899"
      alpha: 50
      outline: "#f472b6"
      outline_alpha: 150
  items:
    # Walls (major visual barriers / tunnel-style blocks)
    - {name: Wall.CenterCore, kind: wall, rect: [1200, 600, 420, 300]}
    - {name: Wall.RoadTunnelLower, kind: wall, rect: [820, 40, 360, 190]}
    - {name: Wall.RoadTunnelUpper, kind: wall, rect: [1620, 1260, 360, 190]}
    - {name: Wall.LeftMidBlock, kind: wall, rect: [360, 640, 210, 250]}
    - {name: Wall.RightMidBlock, kind: wall, rect: [2230, 610, 210, 250]}
    # Energy mechanism and outposts (rules 4.3.2.2 / 4.3.2.3)
    - {name: EnergyMechanism.Center, kind: energy_mechanism, shape: circle, center: [1400, 760], radius: 115}
    - {name: Outpost.RedSide, kind: outpost, shape: circle, center: [1090, 370], radius: 95}
    - {name: Outpost.BlueSide, kind: outpost, shape: circle, center: [1707, 1141], radius: 95}

unit_styles:
  friend:
    color: "#4cc38a"
    outline: "#000000"
  enemy:
    color: "#e85d5d"
    outline: "#000000"
  types:
    Hero:
      label: H
      radius: 9
    Engineer:
      label: E
      radius: 8
    Infantry1:
      label: I1
      radius: 7
    Infantry2:
      label: I2
      radius: 7
    Infantry3:
      label: I3
      radius: 7
    Sentry:
      label: S
      radius: 9
    default:
      label: "?"
      radius: 7

goals:
  - {id: 0, name: Home, red: [393, 810], blue: [2408, 683]}
  - {id: 1, name: Base, red: [401, 691], blue: [2400, 811]}
  - {id: 2, name: Recovery, red: [183, 245], blue: [2619, 1249]}
  - {id: 3, name: BuffShoot, red: [924, 1388], blue: [1872, 115]}
  - {id: 4, name: LeftHighLand, red: [406, 1332], blue: [2392, 187]}
  - {id: 5, name: CastleLeft, red: [657, 952], blue: [2136, 542]}
  - {id: 6, name: Castle, red: [666, 749], blue: [2132, 749]}
  - {id: 7, name: CastleRight1, red: [505, 497], blue: [2293, 1014]}
  - {id: 8, name: CastleRight2, red: [831, 509], blue: [1971, 985]}
  - {id: 9, name: FlyRoad, red: [868, 80], blue: [1929, 1402]}
  - {id: 10, name: OutpostArea, red: [1138, 431], blue: [1635, 1079]}
  - {id: 11, name: MidShoot, red: [1075, 898], blue: [1702, 609]}
  - {id: 12, name: LeftShoot, red: [1165, 1063], blue: [1644, 476]}
  - {id: 13, name: OutpostShoot, red: [1393, 1047], blue: [1434, 497]}
  - {id: 14, name: BuffAround1, red: [1372, 952], blue: [1459, 530]}
  - {id: 15, name: BuffAround2, red: [1203, 770], blue: [1591, 753]}
  - {id: 16, name: RightShoot, red: [1240, 559], blue: [1549, 923]}
  - {id: 17, name: HoleRoad, red: [1074, 1249], blue: [1677, 204]}
  - {id: 18, name: OccupyArea, red: [1075, 898], blue: [1702, 609]}
