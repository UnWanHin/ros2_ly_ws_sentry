    # Camera (shared by detector / calib)
    "camera_param.camera_sn": "FGK24050145" #FGK24050145
    "camera_param/camera_sn": "FGK24050145" #KE0200060396
    "camera_param.ExposureTime": 3000.0
    "camera_param/ExposureTime": 3000.0
    "camera_param.Gain": 12.0
    "camera_param/Gain": 12.0
