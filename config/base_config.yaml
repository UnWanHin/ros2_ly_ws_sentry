    # Extrinsics imported from sentry.aim/src/sentry_tf/config/sentry_tf.yaml
    # barrel_to_camera is the calibrated gimbal_barrel -> gx_camera static TF in meters/radians.
    sentry_tf_node:
      gimbal_topic: "/ly/gimbal/angles"
      world_frame: "gimbal_world"
      barrel_frame: "gimbal_barrel"
      barrel_offset_z: 0.13
    barrel_to_camera:
      x: 0.1168
      y: 0.0746
      z: 0.1146
      yaw: -1.3746
      pitch: -0.0738
      roll: -1.5913
      parent_frame: "gimbal_barrel"
      child_frame: "gx_camera"

    "sentry_tf_node/gimbal_topic": "/ly/gimbal/angles"
    "sentry_tf_node/world_frame": "gimbal_world"
    "sentry_tf_node/barrel_frame": "gimbal_barrel"
    "sentry_tf_node/barrel_offset_z": 0.13
    "barrel_to_camera/x": 0.1168
    "barrel_to_camera/y": 0.0746
    "barrel_to_camera/z": 0.1146
    "barrel_to_camera/yaw": -1.3746
    "barrel_to_camera/pitch": -0.0738
    "barrel_to_camera/roll": -1.5913
    "barrel_to_camera/parent_frame": "gimbal_barrel"
    "barrel_to_camera/child_frame": "gx_camera"

    # Solver intrinsics / extrinsics (shared by detector / tracker_solver / predictor / outpost_hitter)
    solver_config:
      camera_offset: [0.0, 0.0, 52.6]
      camera_rotation: [0.0, 3.3, 0.0]
      camera_intrinsic_matrix:
        - 1533.531924
        - 0.0
        - 607.391567
        - 0.0
        - 1532.734381
        - 495.417894
        - 0.0
        - 0.0
        - 1.0
      camera_distortion_coefficients:
        - -0.210782
        - 0.168691
        - 0.000136
        - -0.000211
        - 0.0

    # Legacy slash-style aliases kept for compatibility readers
    "solver_config/camera_offset": [0.0, 0.0, 52.6]
    "solver_config/camera_rotation": [0.0, 3.3, 0.0]
    "solver_config/camera_intrinsic_matrix":
