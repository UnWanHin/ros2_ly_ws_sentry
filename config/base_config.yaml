    "camera_param/RedBalanceRatio": 1.8906
    "camera_param.GreenBalanceRatio": 1.0
    "camera_param/GreenBalanceRatio": 1.0
    "camera_param.BlueBalanceRatio": 1.5703
    "camera_param/BlueBalanceRatio": 1.5703

    # GX camera schema imported from sentry.aim/src/sentry_gx_camera/config/gx_camera.yaml
    # detector_node reads these keys directly; legacy camera_param/solver_config keys below are kept for other readers.
    gx_camera_node:
      device_sn: ""
      device_index: 1
      frame_id: "gx_camera"
      image_topic: "/camera_front/image_raw"
      camera_info_topic: "/camera_front/camera_info"
      publish_rate: 100.0
      use_compressed_image: true
      jpeg_quality: 20
      gain: 12.0
      auto_gain_max: 12.0
      auto_gain_min: 2.0
      auto_gain: 0
      exposure_time: 3000.0
      auto_exposure_time_max: 10000.0
      auto_exposure_time_min: 1000.0
      auto_exposure: 0
      red_balance_ratio: 1.8906
      green_balance_ratio: 1.0
      blue_balance_ratio: 1.5703
      camera_fx: 1533.531924
      camera_fy: 1532.734381
      camera_cx: 607.391567
      camera_cy: 495.417894
      dist_k1: -0.210782
      dist_k2: 0.168691
      dist_p1: 0.000136
      dist_p2: -0.000211
      dist_k3: 0.0

