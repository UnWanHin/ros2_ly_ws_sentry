      - 0.000136
      - -0.000211
      - 0.0

    # Auxiliary aim camera intrinsics from sentry.aim/src/sentry_usb_camera/config/usb_camera.yaml
    # Kept separate from solver_config so the existing main-camera EKF prediction is unchanged.
    assist_camera_config:
      camera_intrinsic_matrix:
        - 691.095288
        - 0.0
        - 921.905348
        - 0.0
        - 690.254177
        - 642.770163
        - 0.0
